{% set version = "4.7.0" %}
{% set python_min = "3.10.0" %}

package:
  name: pywps
  version: {{ version }}

source:
  url: https://github.com/geopython/pywps/archive/{{ version }}.tar.gz
  sha256: 8aeb4fb8f892550ea2c636a80545f921446d784b128d1f5b00b18bac1d3369a3

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - docutils
    - fiona
    - humanize
    - jinja2
    - jsonschema
    - lxml
    - markupsafe
    - numpy >=1.22.2
    - owslib
    - python-dateutil
    - python-geotiff
    - requests
    - sphinx
    - sqlalchemy
    - tifffile <=2025.5.10
    - urllib3 >=2.5.0
    - werkzeug
    - zarr <3

test:
  imports:
    - pywps
  requires:
    - pip
    - python {{ python_min }}
  commands:
    - pip check

about:
  home: http://pywps.org/
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  summary: PyWPS (Python Web Processing Service) is an implementation of the Web processing Service standard from Open Geospatial Consortium.
  doc_url: https://pywps.org/
  dev_url: https://github.com/geopython/PyWPS

extra:
  recipe-maintainers:
    - Zeitsperre
    - huard
    - cehbrecht
